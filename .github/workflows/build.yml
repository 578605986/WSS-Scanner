name: Build WSS Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
      
      - uses: microsoft/setup-msbuild@v1.1
      
      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      
      - name: Deploy Qt Dependencies
        run: |
          $qtBin = "${env:Qt6_DIR}\bin"
          $exePath = "build\Release\WSS.exe"
          # 复制必要DLL
          Copy-Item "$qtBin\Qt6Core.dll" build\Release\
          Copy-Item "$qtBin\Qt6Gui.dll" build\Release\
          Copy-Item "$qtBin\Qt6Widgets.dll" build\Release\
          # 平台插件
          New-Item -ItemType Directory -Force -Path build\Release\platforms
          Copy-Item "$qtBin\..\plugins\platforms\qwindows.dll" build\Release\platforms\
      
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: WSS-完整版
          path: build\Release\
