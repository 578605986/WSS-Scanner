name: Build WSS Windows EXE

on:
  push:
    branchs: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout/v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action/v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild/v1.1
    
    - name: Build
      run: |
        cmake -B build -S . -DCLKE_BUILD_TYPE=Release
        cmake --build build --config Release --parallel
    
    - name: Upload EXE
      uses: actions/upload-artifact/v4
      with:
        name: WSS-Windows-EXE
        path: build/Release/WSS.exe
