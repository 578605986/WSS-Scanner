name: Build WSS Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: '${{ github.workspace }}/qt/'
      
      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v1.1
      
      - name: Configure CMake
        shell: pwsh
        run: |
          $env:Qt6_DIR = "${{ github.workspace }}/qt/6.5.0/msvc2019_64"
          cmake -B build -S . -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" -DCMAKE_BUILD_TYPE=Release
      
      - name: Build with detailed errors
        shell: pwsh
        run: |
          cmake --build build --config Release 2>&1 | Tee-Object -FilePath build.log
        continue-on-error: true
      
      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
      
      - name: Upload EXE on success
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: WSS-EXE
          path: build/Release/WSS.exe
